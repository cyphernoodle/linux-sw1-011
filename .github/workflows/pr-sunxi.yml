name: PR linux-sunxi → Upstream-Acer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  pr-sunxi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Upstream-Acer (SAFE)
        uses: actions/checkout@v4
        with:
          ref: Upstream-Acer
          fetch-depth: 0

      - name: Fetch sunxi mirror
        run: |
          git fetch origin sunxi-base

      - name: Create branch with sunxi changes
        run: |
          git checkout -B pr-sunxi
          git merge --no-ff --no-edit origin/sunxi-base || true

      - name: Create PR sunxi → Upstream-Acer
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: Upstream-Acer
          branch: pr-sunxi
          title: "sync: linux-sunxi → Upstream-Acer"
          body: |
            Automated merge of jwrdegoede/linux-sunxi into Upstream-Acer.
            Mirror branch: sunxi-base
          signoff: true
