name: Sync upstream mirrors

on:
  schedule:
    - cron: "0 */12 * * *"   # cada 12 horas
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add remotes
        run: |
          git remote add torvalds https://github.com/torvalds/linux.git || true
          git remote add sunxi https://github.com/jwrdegoede/linux-sunxi.git || true

      - name: Sync torvalds-base
        run: |
          git fetch torvalds master
          git checkout torvalds-base
          git reset --hard torvalds/master
          git push origin torvalds-base --force

      - name: Sync sunxi-base
        run: |
          git fetch sunxi main
          git checkout sunxi-base
          git reset --hard sunxi/main
          git push origin sunxi-base --force
