name: PR torvalds → Upstream-Acer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  pr-torvalds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Upstream-Acer (SAFE)
        uses: actions/checkout@v4
        with:
          ref: Upstream-Acer
          fetch-depth: 0

      - name: Fetch torvalds mirror
        run: |
          git fetch origin torvalds-base

      - name: Merge torvalds into Upstream-Acer (local only)
        run: |
          git checkout -B work-torvalds
          git merge --no-ff --no-edit origin/torvalds-base || true

      - name: Create PR torvalds → Upstream-Acer
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: Upstream-Acer
          branch: pr-torvalds
          title: "sync: torvalds → Upstream-Acer"
          body: |
            Automated sync from Linus Torvalds' tree.
            Mirror branch: torvalds-base
          signoff: true
