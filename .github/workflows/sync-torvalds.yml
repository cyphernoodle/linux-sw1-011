name: Sync with torvalds/linux (fast)

on:
  schedule:
    - cron: '0 4 */5 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Upstream-Acer (shallow)
        uses: actions/checkout@v4
        with:
          ref: Upstream-Acer
          fetch-depth: 1

      - name: Configure git identity
        run: |
          git config user.name "Bastián Almendras"
          git config user.email "bastian.almendras96@gmail.com"

      - name: Add torvalds/linux as upstream
        run: |
          git remote add torvalds https://github.com/torvalds/linux.git

      - name: Fetch torvalds/master (shallow, no tags)
        run: |
          git fetch torvalds master --depth=50 --no-tags

      - name: Prepare sync branch
        run: |
          git checkout -b sync-torvalds
          git merge torvalds/master --no-edit --signoff || true

      - name: Create or update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: Upstream-Acer
          branch: sync-torvalds
          title: "Sync with torvalds/linux"
          body: |
            Actualización automática desde https://github.com/torvalds/linux

            Método: merge (shallow fetch optimizado)
            Signed-off-by: Bastián Almendras <bastian.almendras96@gmail.com>
          labels: upstream, kernel, automated
