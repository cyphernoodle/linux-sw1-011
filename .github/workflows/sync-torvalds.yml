name: PR torvalds → Upstream-Acer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # diario, ajusta si quieres

jobs:
  pr-torvalds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Upstream-Acer (SAFE)
        uses: actions/checkout@v4
        with:
          ref: Upstream-Acer
          fetch-depth: 0

      - name: Fetch torvalds mirror
        run: |
          git fetch origin torvalds-base

      - name: Create PR if torvalds has new commits
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: Upstream-Acer
          branch: pr-torvalds
          title: "sync: torvalds/linux → Upstream-Acer"
          body: |
            Automated sync from torvalds/linux.
            Mirror branch: torvalds-base
          signoff: true
